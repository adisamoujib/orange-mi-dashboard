# nginx.conf — Reverse proxy sécurisé pour Orange MI Backend
# À placer dans /etc/nginx/sites-available/orange-mi-api

server {
    listen 443 ssl http2;
    server_name api-mi.votre-domaine.orange.fr;

    # Certificats SSL (Let's Encrypt ou certificat interne Orange)
    ssl_certificate     /etc/ssl/certs/orange-mi.crt;
    ssl_certificate_key /etc/ssl/private/orange-mi.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Headers sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # CORS pour SharePoint — ajustez selon votre tenant
    set $cors_origin "";
    if ($http_origin ~* "^https://(.*\.sharepoint\.com|.*\.orange\.fr)$") {
        set $cors_origin $http_origin;
    }

    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Body size (limiter les abus)
        client_max_body_size 1m;
    }

    # Bloquer l'accès direct au dossier data
    location /data {
        deny all;
    }
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name api-mi.votre-domaine.orange.fr;
    return 301 https://$server_name$request_uri;
}
