<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orange Market Intelligence Dashboard</title>
  <style>*,:before,:after{box-sizing:border-box}body{background:#f5f5f5;margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}#root{min-height:100vh}.spinner{border:4px solid #f60;border-top-color:#0000;border-radius:50%;width:40px;height:40px;margin:auto;animation:.8s linear infinite spin}@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>

  <div id="root">
    <div style="display:flex;height:100vh;align-items:center;justify-content:center;">
      <div class="spinner"></div>
    </div>
  </div>
  <script src="/app.js"></script>

</html>
